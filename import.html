function log(msg, cls='info') {
  const d = document.getElementById('log');
  d.style.display = 'block';
  d.innerHTML += `<div class="${cls}">${msg}</div>`;
  d.scrollTop = d.scrollHeight;
}

async function startImport() {
  const apiKey    = document.getElementById('apiKey').value.trim();
  const projectId = document.getElementById('projectId').value.trim();
  const appId     = document.getElementById('appId').value.trim();

  if (!apiKey || !projectId || !appId) {
    alert('Please fill in all three Firebase config fields first.');
    return;
  }

  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Importing…';

  try {
    firebase.initializeApp({ apiKey, projectId, appId,
      authDomain: `${projectId}.firebaseapp.com`,
      storageBucket: `${projectId}.appspot.com`,
    });
  } catch(e) {
    if (!e.message.includes('already exists')) throw e;
  }

  const db = firebase.firestore();
  log(`Connected to Firestore project: ${projectId}`, 'info');
  log(`Starting import of ${PLAYERS.length} players…`, 'info');

  const BATCH_SIZE = 400;
  let done = 0;

  for (let i = 0; i < PLAYERS.length; i += BATCH_SIZE) {
    const batch = db.batch();
    const chunk = PLAYERS.slice(i, i + BATCH_SIZE);
    chunk.forEach(player => {
      const ref = db.collection('players').doc(String(player.id));
      batch.set(ref, player);
    });
    try {
      await batch.commit();
      done += chunk.length;
      const pct = Math.round((done / PLAYERS.length) * 100);
      document.getElementById('bar').style.width = pct + '%';
      log(`✓ Batch ${Math.ceil((i+1)/BATCH_SIZE)}: imported ${done}/${PLAYERS.length} players`, 'ok');
    } catch(e) {
      log(`✗ Batch failed: ${e.message}`, 'err');
      log('Check your Firestore rules — they must allow write: if true temporarily.', 'err');
      btn.disabled = false;
      btn.textContent = 'Retry Import';
      return;
    }
  }

  log('', '');
  log('🎉 ALL 295 PLAYERS IMPORTED SUCCESSFULLY!', 'ok');
  log('', '');
  log('NEXT STEPS:', 'info');
  log('1. Go to Firebase Console → Firestore → Rules', 'info');
  log('2. Change allow write: if true  →  allow write: if false', 'info');
  log('3. Click Publish', 'info');
  log('4. Delete this import.html file from your GitHub repo', 'info');
  btn.textContent = '✓ Done!';
}
